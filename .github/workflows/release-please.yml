name: Release Please

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: develop

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup git
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create sync PR to main
        if: ${{ steps.release.outputs.release_created }}
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SYNC_BRANCH="sync-to-main-${TIMESTAMP}"

          git checkout -b "$SYNC_BRANCH"

          # Remove workflow files (main must not have these)
          git rm -q .github/workflows/ci.yml .github/workflows/release-please.yml 2>/dev/null || true

          # Restore dist/ from main
          git checkout origin/main -- dist/

          git commit -m "chore: sync develop to main" --allow-empty

          git push origin "$SYNC_BRANCH"

          gh pr create \
            --base main \
            --head "$SYNC_BRANCH" \
            --title "chore: sync develop to main (v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }})" \
            --body "Automated sync from develop to main following release v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}.
        After merging this PR, run the **Update Major Tag** workflow to repoint the \`v${{ steps.release.outputs.major }}\` tag."
        env:
          GH_TOKEN: ${{ github.token }}
